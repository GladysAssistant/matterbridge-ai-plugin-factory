name: "🔌 Plugin Request"
description: "Request a new Matterbridge plugin to be created by the AI Factory"
title: "[PLUGIN REQUEST] "
labels: ["plugin-request", "ai-factory", "pending-review"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 🏭 Matterbridge AI Plugin Factory
        
        Thank you for requesting a new plugin! Our AI agent will analyze your request and attempt to create a Matterbridge plugin.
        
        **Important:** This factory works by adapting existing integrations from other projects. You MUST provide links to existing implementations.

  - type: input
    id: device_name
    attributes:
      label: "Device/Service Name"
      description: "What device or service should this plugin support?"
      placeholder: "e.g., Philips Hue, Tuya, Shelly, etc."
    validations:
      required: true

  - type: dropdown
    id: device_category
    attributes:
      label: "Device Category"
      description: "What type of device is this?"
      options:
        - Light (on/off, dimming, color)
        - Switch/Outlet
        - Thermostat/Climate
        - Sensor (temperature, humidity, motion, etc.)
        - Lock
        - Cover (blinds, shades, garage door)
        - Fan
        - Media Player
        - Camera
        - Other
    validations:
      required: true

  - type: textarea
    id: api_documentation
    attributes:
      label: "API Documentation"
      description: "Provide links to the official API documentation"
      placeholder: |
        - Official API docs: https://...
        - Developer portal: https://...
    validations:
      required: true

  - type: textarea
    id: existing_integrations
    attributes:
      label: "Existing Integrations (REQUIRED)"
      description: |
        Provide links to existing integrations in other projects. This is MANDATORY.
        The AI factory works by adapting existing implementations, not creating from scratch.
      placeholder: |
        - Home Assistant integration: https://github.com/home-assistant/core/tree/dev/homeassistant/components/...
        - Node-RED node: https://flows.nodered.org/node/...
        - OpenHAB binding: https://github.com/openhab/openhab-addons/tree/main/bundles/...
        - Other npm package: https://www.npmjs.com/package/...
    validations:
      required: true

  - type: textarea
    id: device_capabilities
    attributes:
      label: "Device Capabilities"
      description: "List all the capabilities/features you want exposed to Matter"
      placeholder: |
        - On/Off control
        - Brightness (0-100%)
        - Color temperature
        - RGB color
        - etc.
    validations:
      required: true

  - type: dropdown
    id: authentication_type
    attributes:
      label: "Authentication Type"
      description: "How does the device/service authenticate?"
      options:
        - No authentication (local only)
        - API Key
        - OAuth 2.0
        - Username/Password
        - Token-based
        - Cloud account
        - Other
    validations:
      required: true

  - type: dropdown
    id: connection_type
    attributes:
      label: "Connection Type"
      description: "How does the device communicate?"
      options:
        - Local HTTP/REST API
        - Local WebSocket
        - Cloud API
        - MQTT
        - CoAP
        - Bluetooth
        - Zigbee (via gateway)
        - Z-Wave (via gateway)
        - Other
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: "Additional Context"
      description: "Any other information that might help the AI create this plugin"
      placeholder: |
        - Special considerations
        - Known limitations
        - Specific device models to support
        - etc.
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: "Confirmations"
      description: "Please confirm the following"
      options:
        - label: "I have provided links to existing integrations in other projects"
          required: true
        - label: "I have verified the API documentation is accessible"
          required: true
        - label: "I understand this is an automated AI process and results may vary"
          required: true
        - label: "I am willing to test the generated plugin and provide feedback"
          required: true
