# Labels for the Matterbridge AI Plugin Factory
# Use with github-label-sync or similar tools

# Request Status Labels
- name: plugin-request
  color: "0052CC"
  description: "A request for a new Matterbridge plugin"

- name: pending-review
  color: "FBCA04"
  description: "Waiting for AI agent to process"

- name: in-progress
  color: "5319E7"
  description: "AI agent is working on this plugin"

- name: ready-for-testing
  color: "0E8A16"
  description: "Plugin is ready for user testing"

- name: needs-revision
  color: "D93F0B"
  description: "Plugin needs fixes based on feedback"

- name: needs-info
  color: "E99695"
  description: "More information needed from requester"

- name: completed
  color: "2EA44F"
  description: "Plugin successfully created and tested"

- name: error
  color: "B60205"
  description: "An error occurred during processing"

# Category Labels
- name: ai-factory
  color: "1D76DB"
  description: "Processed by AI Plugin Factory"

- name: ai-generated
  color: "7057FF"
  description: "Code generated by AI"

# Device Type Labels
- name: device-light
  color: "FEF2C0"
  description: "Light/Bulb device"

- name: device-switch
  color: "D4C5F9"
  description: "Switch/Outlet device"

- name: device-sensor
  color: "C5DEF5"
  description: "Sensor device"

- name: device-thermostat
  color: "F9D0C4"
  description: "Thermostat/Climate device"

- name: device-lock
  color: "BFDADC"
  description: "Lock device"

- name: device-cover
  color: "D4C5F9"
  description: "Cover/Blinds device"
